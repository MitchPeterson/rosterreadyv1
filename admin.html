<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RosterReady</title>
    <style>
        :root {
            --primary-red: #E63946; --accent-purple: #9B59B6; --white: #FFFFFF;
            --off-white: #F8F9FA; --text-dark: #2C3E50; --text-medium: #5A6C7D;
            --border-light: #E8EAF0; --shadow: rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #F8F9FA 0%, #E8EEF5 100%);
            color: var(--text-dark); min-height: 100vh;
        }
        .top-nav {
            background: white; border-radius: 20px; padding: 16px 32px; margin: 20px;
            box-shadow: 0 4px 16px var(--shadow); display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo { width: 50px; height: 50px; }
        .page-title { font-size: 20px; font-weight: 800; margin-left: 16px; }
        .btn-logout {
            padding: 10px 20px; background: var(--off-white); border: 2px solid var(--border-light);
            border-radius: 12px; font-weight: 600; text-decoration: none; color: var(--text-dark); font-family: Georgia, serif;
        }
        .org-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .org-card {
            background: white; border-radius: 20px; padding: 32px;
            box-shadow: 0 4px 16px var(--shadow); transition: all 0.3s ease;
        }
        .org-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .org-icon {
            width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent-purple), #8E44AD);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; font-size: 28px; color: white; font-weight: 700;
            box-shadow: 0 6px 16px rgba(155,89,182,0.3);
        }
        .org-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .org-meta { color: var(--text-medium); font-size: 14px; margin-bottom: 16px; }
        .org-btn {
            width: 100%; padding: 12px; background: var(--primary-red); color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; font-family: Georgia, serif; text-decoration: none;
            display: block; text-align: center;
        }
        .org-btn:hover { background: #C1121F; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="top-nav">
        <div style="display: flex; align-items: center;">
            <img src="RR_Logo.png" alt="RosterReady" class="nav-logo">
            <div class="page-title">My Organizations</div>
        </div>
        <a href="index.html" class="btn-logout">Sign Out</a>
    </div>

    <div class="org-grid">
        <div class="org-card">
            <div class="org-icon">RT</div>
            <div class="org-name">Rosemount Thunder Softball</div>
            <div class="org-meta">3 teams • 45 players</div>
            <a href="tryout-designer.html" class="org-btn">Manage Tryouts</a>
        </div>

        <div class="org-card">
            <div class="org-icon">MV</div>
            <div class="org-name">Minnesota Valley Fastpitch</div>
            <div class="org-meta">5 teams • 78 players</div>
            <a href="tryout-designer.html" class="org-btn">Manage Tryouts</a>
        </div>

        <div class="org-card" style="border: 2px dashed var(--border-light); background: var(--off-white);">
            <div class="org-icon" style="background: transparent; color: var(--text-medium); font-size: 48px;">+</div>
            <div class="org-name" style="color: var(--text-medium);">Add Organization</div>
            <div class="org-meta">Create a new organization</div>
            <button class="org-btn" style="background: var(--off-white); color: var(--text-dark); border: 2px solid var(--border-light);" onclick="alert('Feature coming soon!')">
                Create New
            </button>
        </div>
    </div>
</body>
</html>
