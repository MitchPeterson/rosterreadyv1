<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosterReady - Softball Tryout Management</title>
    <style>
        :root {
            --primary-red: #E63946;
            --deep-red: #C1121F;
            --light-blue: #4A90E2;
            --text-dark: #2C3E50;
            --text-medium: #5A6C7D;
            --border-light: #E8EAF0;
            --off-white: #F8F9FA;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #F8F9FA 0%, #E8EEF5 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        .auth-logo {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .auth-title {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-medium);
            margin-bottom: 32px;
            font-size: 16px;
        }
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .login-btn {
            padding: 20px;
            background: white;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-dark);
            display: block;
            text-align: center;
        }
        .login-btn:hover {
            border-color: var(--primary-red);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.2);
        }
        .footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-medium);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <img src="RR_Logo.png" alt="RosterReady Logo" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <h1 class="auth-title">RosterReady</h1>
        <p class="auth-subtitle">Professional Softball Tryout Management</p>
        
        <div class="button-grid">
            <a href="player.html" class="login-btn">Player</a>
            <a href="parent.html" class="login-btn">Parent</a>
            <a href="coach.html" class="login-btn">Coach</a>
            <a href="admin.html" class="login-btn">Admin</a>
        </div>
        
        <div class="footer">
            Select your role to continue
        </div>
    </div>
</body>
</html>
